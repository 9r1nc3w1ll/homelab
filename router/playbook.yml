---
- name: Deploy Home Assistant and Portainer on OpenWrt
  hosts: openwrt
  become: false
  gather_facts: false

  vars:
    lab_dir: /opt/lab

  tasks:
    - name: Check if Docker is installed
      command: which docker
      register: docker_check
      changed_when: false
      failed_when: false

    - name: Fail if Docker is not installed
      fail:
        msg: "Docker is not installed. Please install Docker first."
      when: docker_check.rc != 0

    - name: Check if Docker Compose is installed
      command: which docker-compose
      register: docker_compose_check
      changed_when: false
      failed_when: false

    - name: Install Docker Compose if not present
      get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'
      when: docker_compose_check.rc != 0

    - name: Create lab directory
      file:
        path: "{{ lab_dir }}"
        state: directory
        mode: '0755'

    - name: Create homeassistant directory
      file:
        path: "{{ lab_dir }}/homeassistant"
        state: directory
        mode: '0755'

    - name: Copy compose.yml to remote host
      copy:
        src: compose.yml
        dest: "{{ lab_dir }}/compose.yml"
        mode: '0644'

    - name: Ensure OpenWrt firewall allows LAN to reach Docker-published ports
      shell: |
        set -e
        if uci show firewall | grep -q "=forwarding" && uci show firewall | grep -q "\.src='lan'" && uci show firewall | grep -q "\.dest='docker'"; then
          exit 0
        fi
        sec=$(uci add firewall forwarding)
        uci set firewall.${sec}.name='lan_to_docker'
        uci set firewall.${sec}.src='lan'
        uci set firewall.${sec}.dest='docker'
        uci commit firewall
        /etc/init.d/firewall reload
      args:
        executable: /bin/sh
      changed_when: true

    - name: Stop existing containers if running
      command: docker compose -f {{ lab_dir }}/compose.yml down
      args:
        chdir: "{{ lab_dir }}"
      ignore_errors: true
      changed_when: false

    - name: Pull Docker images
      command: docker compose -f {{ lab_dir }}/compose.yml pull
      args:
        chdir: "{{ lab_dir }}"
      register: pull_result
      changed_when: "'Downloaded newer image' in pull_result.stdout"

    - name: Start containers
      command: docker compose -f {{ lab_dir }}/compose.yml up -d
      args:
        chdir: "{{ lab_dir }}"
      register: start_result
      changed_when: "'Creating' in start_result.stdout or 'Starting' in start_result.stdout"

    - name: Show container status
      command: docker compose -f {{ lab_dir }}/compose.yml ps
      args:
        chdir: "{{ lab_dir }}"
      register: container_status
      changed_when: false

    - name: Display container status
      debug:
        var: container_status.stdout_lines

